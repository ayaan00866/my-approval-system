<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar — Token & Cookie Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ===========================================
           STELLAR — Premium Luxury Theme
           Inspired by deep navy fiber-optic aesthetic
           =========================================== */

        :root {
            --navy-900: #0a1438;
            --navy-800: #0f1d4d;
            --navy-700: #1a2e6b;
            --royal: #3b5bdb;
            --royal-light: #6d8bff;
            --sky-soft: #b8cfff;
            --white-soft: #eaf1ff;
            --text-main: #f5f8ff;
            --text-muted: #a9b8de;
            --success: #4ade80;
            --danger: #ff6b7d;
            --warning: #ffc860;
            --border-glass: rgba(180, 200, 255, 0.14);
            --glass-bg: rgba(20, 35, 80, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        html, body {
            min-height: 100vh;
            background: #05091f;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* ============ BACKGROUND LAYERS ============ */
        .bg-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .bg-gradient {
            background:
                radial-gradient(ellipse 80% 60% at 85% 95%, rgba(200, 220, 255, 0.35) 0%, transparent 55%),
                radial-gradient(ellipse 70% 70% at 15% 10%, #0a1438 0%, #060b24 60%),
                linear-gradient(135deg, #0a1438 0%, #132458 40%, #2a4aa8 75%, #c9d9ff 100%);
        }

        .bg-rays {
            background:
                conic-gradient(from 20deg at 5% 105%,
                    transparent 0deg,
                    rgba(140, 175, 255, 0.08) 8deg,
                    rgba(180, 200, 255, 0.18) 16deg,
                    rgba(140, 175, 255, 0.08) 24deg,
                    transparent 32deg,
                    rgba(160, 190, 255, 0.12) 45deg,
                    transparent 60deg,
                    rgba(180, 210, 255, 0.14) 75deg,
                    transparent 90deg);
            filter: blur(2px);
            opacity: 0.9;
        }

        .bg-glow {
            background:
                radial-gradient(circle at 90% 100%, rgba(220, 230, 255, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 10% 110%, rgba(100, 140, 255, 0.35) 0%, transparent 45%);
            mix-blend-mode: screen;
        }

        .bg-bokeh { overflow: hidden; }

        .bokeh {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(220, 230, 255, 0.95) 0%,
                rgba(150, 180, 255, 0.55) 40%,
                rgba(80, 120, 220, 0.1) 70%,
                transparent 100%);
            filter: blur(1px);
            animation: float linear infinite;
            opacity: 0.7;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { opacity: 0.85; }
            100% { transform: translateY(-60px) scale(1.08); opacity: 0.3; }
        }

        /* ============ BRAND ============ */
        .brand {
            position: fixed;
            top: 1.8rem;
            left: 2.2rem;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--white-soft);
            text-shadow: 0 0 20px rgba(180, 210, 255, 0.5);
            z-index: 200;
        }

        /* ============ NAV ============ */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem 2rem;
            margin-top: 4.5rem;
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            background: rgba(10, 20, 56, 0.35);
            border-bottom: 1px solid var(--border-glass);
        }

        .nav-inner {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 2.5rem;
        }

        .nav-link {
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            padding: 0.35rem 0;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-link:hover { color: var(--sky-soft); }
        .nav-link.active { color: var(--white-soft); }

        .nav-link.active::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: -4px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--royal-light) 50%, transparent);
            box-shadow: 0 0 12px var(--royal-light);
            border-radius: 2px;
        }

        /* ============ CONTAINER ============ */
        .container {
            max-width: 780px;
            margin: 3rem auto 4rem;
            width: 92%;
            position: relative;
            z-index: 10;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============ GLASS CARD ============ */
        .card {
            position: relative;
            background: linear-gradient(145deg,
                rgba(30, 50, 110, 0.45) 0%,
                rgba(15, 25, 70, 0.55) 100%);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border: 1px solid var(--border-glass);
            border-radius: 22px;
            padding: 2.5rem;
            box-shadow:
                0 30px 70px -10px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                0 1px 0 rgba(255, 255, 255, 0.08) inset;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(180, 210, 255, 0.6),
                transparent);
        }

        .card::after {
            content: '';
            position: absolute;
            top: -40%;
            right: -30%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(110, 140, 255, 0.18) 0%, transparent 70%);
            pointer-events: none;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.01em;
            color: var(--white-soft);
        }

        .icon-glow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, rgba(109, 139, 255, 0.25), rgba(59, 91, 219, 0.15));
            border: 1px solid rgba(180, 210, 255, 0.25);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(109, 139, 255, 0.3);
            font-size: 1.2rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
            line-height: 1.5;
        }

        /* ============ INPUTS ============ */
        .input-group {
            margin-bottom: 1.3rem;
            position: relative;
            z-index: 2;
        }

        label {
            display: block;
            margin-bottom: 0.55rem;
            color: var(--sky-soft);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            background: rgba(10, 18, 45, 0.65);
            border: 1px solid rgba(180, 210, 255, 0.12);
            padding: 0.9rem 1rem;
            border-radius: 12px;
            color: var(--white-soft);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]::placeholder { color: rgba(169, 184, 222, 0.5); }

        input[type="text"]:focus,
        input[type="file"]:focus {
            border-color: var(--royal-light);
            background: rgba(15, 25, 65, 0.8);
            box-shadow:
                0 0 0 3px rgba(109, 139, 255, 0.15),
                0 0 25px rgba(109, 139, 255, 0.25);
        }

        input[type="file"]::file-selector-button {
            background: linear-gradient(135deg, rgba(109, 139, 255, 0.25), rgba(59, 91, 219, 0.2));
            color: var(--white-soft);
            border: 1px solid rgba(180, 210, 255, 0.2);
            padding: 0.4rem 0.9rem;
            border-radius: 8px;
            font-weight: 600;
            margin-right: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="file"]::file-selector-button:hover {
            background: linear-gradient(135deg, rgba(109, 139, 255, 0.4), rgba(59, 91, 219, 0.3));
        }

        /* ============ BUTTON ============ */
        .btn-start {
            margin-top: 0.5rem;
            background: linear-gradient(135deg, #4a6dff 0%, #6d8bff 50%, #a8c0ff 100%);
            color: #0a1438;
            border: none;
            padding: 1rem 1.25rem;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.98rem;
            letter-spacing: 0.02em;
            cursor: pointer;
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow:
                0 10px 30px -8px rgba(74, 109, 255, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.15) inset,
                0 1px 0 rgba(255, 255, 255, 0.35) inset;
            position: relative;
            overflow: hidden;
        }

        .btn-start::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 30%, rgba(255, 255, 255, 0.4) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow:
                0 15px 40px -8px rgba(74, 109, 255, 0.8),
                0 0 0 1px rgba(255, 255, 255, 0.25) inset,
                0 0 30px rgba(109, 139, 255, 0.5);
        }

        .btn-start:hover::before { transform: translateX(100%); }
        .btn-start:active { transform: translateY(0); }

        /* ============ RESULT ============ */
        .result-container {
            margin-top: 2rem;
            display: none;
            animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            background: rgba(10, 18, 45, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-bottom: none;
            border-radius: 16px 16px 0 0;
        }

        .chip {
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .chip-live {
            background: rgba(74, 222, 128, 0.12);
            border: 1px solid rgba(74, 222, 128, 0.3);
            color: var(--success);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.15);
        }

        .chip-dead {
            background: rgba(255, 107, 125, 0.12);
            border: 1px solid rgba(255, 107, 125, 0.3);
            color: var(--danger);
            box-shadow: 0 0 15px rgba(255, 107, 125, 0.15);
        }

        .chip b { font-weight: 800; color: var(--white-soft); }

        .download-btn {
            margin-left: auto;
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.2), rgba(74, 222, 128, 0.1));
            border: 1px solid rgba(74, 222, 128, 0.4);
            color: #86efac;
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.15);
        }
        .download-btn:hover {
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.35), rgba(74, 222, 128, 0.2));
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 0 25px rgba(74, 222, 128, 0.35);
        }
        .download-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .view-btn {
            background: linear-gradient(135deg, rgba(109, 139, 255, 0.22), rgba(59, 91, 219, 0.12));
            border: 1px solid rgba(180, 210, 255, 0.35);
            color: var(--sky-soft);
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(109, 139, 255, 0.15);
        }
        .view-btn:hover {
            background: linear-gradient(135deg, rgba(109, 139, 255, 0.4), rgba(59, 91, 219, 0.22));
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 0 25px rgba(109, 139, 255, 0.35);
        }
        .view-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        /* Valid-file preview box (inline dashboard viewer) */
        .valid-preview {
            display: none;
            margin-top: 1rem;
            background: rgba(5, 10, 30, 0.82);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(74, 222, 128, 0.25);
            border-radius: 16px;
            overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 25px rgba(74, 222, 128, 0.12);
        }
        .valid-preview.open { display: block; }

        .valid-preview-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 1.25rem;
            background: rgba(74, 222, 128, 0.08);
            border-bottom: 1px solid rgba(74, 222, 128, 0.18);
            font-size: 0.88rem;
            font-weight: 600;
            color: #86efac;
        }
        .valid-preview-header .filename {
            color: var(--white-soft);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            opacity: 0.85;
        }
        .valid-preview-header .close-x {
            margin-left: auto;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-muted);
            width: 28px;
            height: 28px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.25s;
            font-size: 0.9rem;
        }
        .valid-preview-header .close-x:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--white-soft);
        }

        .valid-preview-toolbar {
            display: flex;
            gap: 0.5rem;
            padding: 0.7rem 1.25rem;
            background: rgba(10, 18, 45, 0.5);
            border-bottom: 1px solid var(--border-glass);
        }
        .tool-btn {
            background: rgba(109, 139, 255, 0.12);
            border: 1px solid rgba(180, 210, 255, 0.2);
            color: var(--sky-soft);
            padding: 0.35rem 0.75rem;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
        }
        .tool-btn:hover {
            background: rgba(109, 139, 255, 0.25);
            color: var(--white-soft);
        }

        .valid-preview-body {
            padding: 1rem 1.25rem;
            max-height: 320px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.82rem;
            line-height: 1.7;
            color: #cfe0ff;
        }
        .valid-preview-body .line {
            display: flex;
            gap: 10px;
            padding: 4px 6px;
            border-radius: 6px;
            word-break: break-all;
        }
        .valid-preview-body .line:hover { background: rgba(109, 139, 255, 0.08); }
        .valid-preview-body .line-num {
            color: var(--text-muted);
            opacity: 0.6;
            min-width: 28px;
            user-select: none;
            text-align: right;
        }
        .valid-preview-body::-webkit-scrollbar { width: 8px; }
        .valid-preview-body::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--royal), var(--royal-light));
            border-radius: 10px;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(10, 20, 50, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(74, 222, 128, 0.4);
            color: #86efac;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s ease;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 20px rgba(74, 222, 128, 0.2);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .output-box {
            background: rgba(5, 10, 30, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 0 0 16px 16px;
            padding: 1.5rem 1.75rem;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            white-space: pre-wrap;
            font-size: 0.88rem;
            line-height: 1.7;
            max-height: 460px;
            overflow-y: auto;
            color: #cbd8f5;
        }

        .status-checking {
            color: var(--warning);
            font-style: italic;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .output-box::-webkit-scrollbar { width: 8px; }
        .output-box::-webkit-scrollbar-track { background: transparent; }
        .output-box::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--royal), var(--royal-light));
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .brand { top: 1.2rem; left: 1.2rem; font-size: 1.1rem; }
            nav { margin-top: 3.5rem; padding: 0.9rem 1.2rem; }
            .nav-inner { gap: 1.5rem; }
            .card { padding: 1.75rem 1.3rem; border-radius: 18px; }
            h2 { font-size: 1.2rem; }
            .container { margin: 2rem auto 3rem; }
        }
    </style>
</head>
<body>

    <!-- Luxury Background Layers -->
    <div class="bg-layer bg-gradient"></div>
    <div class="bg-layer bg-rays"></div>
    <div class="bg-layer bg-bokeh" id="bokehLayer"></div>
    <div class="bg-layer bg-glow"></div>

    <!-- Brand -->
    <div class="brand">stellar</div>

    <nav>
        <div class="nav-inner">
            <div class="nav-link active" data-tab="token-checker">Token Checker</div>
            <div class="nav-link" data-tab="cookie-checker">Cookie Checker</div>
        </div>
    </nav>

    <div class="container">
        <div id="token-checker" class="tab-content active">
            <div class="card">
                <h2><span class="icon-glow">🔐</span> Token Checker</h2>
                <p class="subtitle">Verify the validity of any access token — single or bulk.</p>
                <div class="input-group">
                    <label>Single Token</label>
                    <input type="text" id="tokenSingle" placeholder="Paste your token here...">
                </div>
                <div class="input-group">
                    <label>Bulk File Upload (.txt)</label>
                    <input type="file" id="tokenFile" accept=".txt">
                </div>
                <button class="btn-start" onclick="handleProcess('token')">
                    <span>Start Checking</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
                </button>
            </div>

            <div id="tokenResultContainer" class="result-container">
                <div class="result-header">
                    <span class="chip chip-live">✅ Live: <b id="tokenLiveCount">0</b></span>
                    <span class="chip chip-dead">❌ Dead: <b id="tokenDeadCount">0</b></span>
                    <button class="view-btn" id="tokenViewBtn" disabled onclick="toggleValidPreview('token')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        Open File
                    </button>
                    <button class="download-btn" id="tokenDownloadBtn" disabled onclick="downloadValid('token')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Download
                    </button>
                </div>
                <div id="outputToken" class="output-box"></div>

                <div class="valid-preview" id="tokenValidPreview">
                    <div class="valid-preview-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <span>valid_tokens.txt</span>
                        <span class="filename" id="tokenFilenamePreview">— 0 entries</span>
                        <button class="close-x" onclick="toggleValidPreview('token', true)" title="Close">×</button>
                    </div>
                    <div class="valid-preview-toolbar">
                        <button class="tool-btn" onclick="copyValid('token')">📋 Copy All</button>
                        <button class="tool-btn" onclick="downloadValid('token')">⬇ Download</button>
                    </div>
                    <div class="valid-preview-body" id="tokenValidBody"></div>
                </div>
            </div>
        </div>

        <div id="cookie-checker" class="tab-content">
            <div class="card">
                <h2><span class="icon-glow">🍪</span> Cookie Checker</h2>
                <p class="subtitle">Validate session cookies with precision and speed.</p>
                <div class="input-group">
                    <label>Single Cookie</label>
                    <input type="text" id="cookieSingle" placeholder="Paste your cookie here...">
                </div>
                <div class="input-group">
                    <label>Bulk File Upload (.txt)</label>
                    <input type="file" id="cookieFile" accept=".txt">
                </div>
                <button class="btn-start" onclick="handleProcess('cookie')">
                    <span>Start Checking</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
                </button>
            </div>

            <div id="cookieResultContainer" class="result-container">
                <div class="result-header">
                    <span class="chip chip-live">✅ Live: <b id="cookieLiveCount">0</b></span>
                    <span class="chip chip-dead">❌ Dead: <b id="cookieDeadCount">0</b></span>
                    <button class="view-btn" id="cookieViewBtn" disabled onclick="toggleValidPreview('cookie')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        Open File
                    </button>
                    <button class="download-btn" id="cookieDownloadBtn" disabled onclick="downloadValid('cookie')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Download
                    </button>
                </div>
                <div id="outputCookie" class="output-box"></div>

                <div class="valid-preview" id="cookieValidPreview">
                    <div class="valid-preview-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <span>valid_cookies.txt</span>
                        <span class="filename" id="cookieFilenamePreview">— 0 entries</span>
                        <button class="close-x" onclick="toggleValidPreview('cookie', true)" title="Close">×</button>
                    </div>
                    <div class="valid-preview-toolbar">
                        <button class="tool-btn" onclick="copyValid('cookie')">📋 Copy All</button>
                        <button class="tool-btn" onclick="downloadValid('cookie')">⬇ Download</button>
                    </div>
                    <div class="valid-preview-body" id="cookieValidBody"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        /* Tab switching */
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                const tabId = link.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                link.classList.add('active');
            });
        });

        /* Bokeh particles matching reference image */
        (function createBokeh() {
            const layer = document.getElementById('bokehLayer');
            if (!layer) return;
            const particles = 55;
            for (let i = 0; i < particles; i++) {
                const b = document.createElement('span');
                b.className = 'bokeh';
                const leftBias = Math.random() < 0.75;
                const x = leftBias ? Math.random() * 55 : 55 + Math.random() * 45;
                const y = 20 + Math.random() * 80;
                const size = 6 + Math.random() * 34;
                const duration = 8 + Math.random() * 14;
                const delay = Math.random() * 10;
                const opacity = 0.25 + Math.random() * 0.6;
                b.style.left = x + '%';
                b.style.top = y + '%';
                b.style.width = size + 'px';
                b.style.height = size + 'px';
                b.style.animationDuration = duration + 's';
                b.style.animationDelay = '-' + delay + 's';
                b.style.opacity = opacity;
                if (Math.random() < 0.3) b.style.filter = 'blur(3px)';
                layer.appendChild(b);
            }
        })();

        /* Store valid items per type so user can download them */
        const validItems = { token: [], cookie: [] };

        /* Mock checker — same UX as your original backend call, but client-only */
        async function handleProcess(type) {
            const isToken = type === 'token';
            const container = document.getElementById(isToken ? 'tokenResultContainer' : 'cookieResultContainer');
            const output   = document.getElementById(isToken ? 'outputToken' : 'outputCookie');
            const liveC    = document.getElementById(isToken ? 'tokenLiveCount' : 'cookieLiveCount');
            const deadC    = document.getElementById(isToken ? 'tokenDeadCount' : 'cookieDeadCount');
            const dlBtn    = document.getElementById(isToken ? 'tokenDownloadBtn' : 'cookieDownloadBtn');
            const viewBtn  = document.getElementById(isToken ? 'tokenViewBtn' : 'cookieViewBtn');

            const singleInput = document.getElementById(isToken ? 'tokenSingle' : 'cookieSingle').value.trim();
            const fileInput   = document.getElementById(isToken ? 'tokenFile'   : 'cookieFile').files[0];

            let list = [];
            if (singleInput) {
                list.push(singleInput);
            } else if (fileInput) {
                const text = await fileInput.text();
                list = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            } else {
                alert('Please enter a value or upload a file.');
                return;
            }

            // reset state for this run
            validItems[type] = [];
            dlBtn.disabled = true;
            viewBtn.disabled = true;
            // close any previously-open preview for this type
            const prevPreview = document.getElementById(isToken ? 'tokenValidPreview' : 'cookieValidPreview');
            prevPreview.classList.remove('open');

            container.style.display = 'block';
            output.innerHTML = `<div class="status-checking">⏳ Checking ${type}s... Please wait.</div>`;
            liveC.innerText = '0';
            deadC.innerText = '0';

            let live = 0, dead = 0;
            let report = `📊 DETAILED ${type.toUpperCase()} REPORT\n━━━━━━━━━━━━━━━━━━━━━\n`;

            for (const item of list) {
                await new Promise(r => setTimeout(r, 350 + Math.random() * 400));
                const isLive = item.length > 20 && Math.random() > 0.35;
                if (isLive) {
                    live++;
                    validItems[type].push(item);
                    const uid = Math.floor(100000000 + Math.random() * 900000000);
                    report += `✅ NAME: User_${uid.toString().slice(-4)}\n🆔 UID: ${uid}\n━━━━━━━━━━━━━━━━━━━━━\n`;
                } else {
                    dead++;
                    const preview = item.substring(0, 10) + '...';
                    report += `❌ DEAD: ${preview}\n⚠️ Reason: Expired / Invalid\n━━━━━━━━━━━━━━━━━━━━━\n`;
                }
                liveC.innerText = live;
                deadC.innerText = dead;
                output.innerText = report;
            }

            // Enable buttons if we have any valid items
            const hasValid = validItems[type].length > 0;
            dlBtn.disabled = !hasValid;
            viewBtn.disabled = !hasValid;

            // Update preview body (even if closed) and filename label
            renderValidPreview(type);
        }

        /* Render the valid items into the inline preview */
        function renderValidPreview(type) {
            const isToken = type === 'token';
            const body   = document.getElementById(isToken ? 'tokenValidBody' : 'cookieValidBody');
            const label  = document.getElementById(isToken ? 'tokenFilenamePreview' : 'cookieFilenamePreview');
            const items  = validItems[type] || [];

            label.textContent = `— ${items.length} ${items.length === 1 ? 'entry' : 'entries'}`;

            if (items.length === 0) {
                body.innerHTML = '<div style="color:var(--text-muted);font-style:italic;padding:8px;">No valid items yet.</div>';
                return;
            }
            body.innerHTML = items.map((it, idx) =>
                `<div class="line"><span class="line-num">${idx + 1}</span><span>${escapeHtml(it)}</span></div>`
            ).join('');
        }

        function escapeHtml(s) {
            return s.replace(/[&<>"']/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        }

        /* Toggle inline preview open/close */
        function toggleValidPreview(type, forceClose) {
            const isToken = type === 'token';
            const preview = document.getElementById(isToken ? 'tokenValidPreview' : 'cookieValidPreview');
            if (forceClose) {
                preview.classList.remove('open');
                return;
            }
            if (validItems[type].length === 0) return;
            renderValidPreview(type);
            preview.classList.toggle('open');
            if (preview.classList.contains('open')) {
                preview.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        /* Copy all valid items to clipboard */
        async function copyValid(type) {
            const items = validItems[type] || [];
            if (items.length === 0) return;
            try {
                await navigator.clipboard.writeText(items.join('\n'));
                showToast(`✅ Copied ${items.length} valid ${type}${items.length > 1 ? 's' : ''} to clipboard`);
            } catch (e) {
                showToast('❌ Copy failed — please copy manually');
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => t.classList.remove('show'), 2400);
        }

        /* Download valid tokens/cookies as a SEPARATE .txt file (tokens & cookies kept separate) */
        function downloadValid(type) {
            const items = validItems[type] || [];
            if (items.length === 0) {
                alert('No valid ' + type + 's to download yet.');
                return;
            }
            const content = items.join('\n');
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);

            const ts = new Date();
            const pad = n => String(n).padStart(2, '0');
            const stamp = `${ts.getFullYear()}${pad(ts.getMonth()+1)}${pad(ts.getDate())}_${pad(ts.getHours())}${pad(ts.getMinutes())}${pad(ts.getSeconds())}`;
            // Separate filenames: valid_tokens_... vs valid_cookies_...
            const filename = `valid_${type}s_${stamp}.txt`;

            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 2000);
            showToast(`⬇ Downloaded ${filename}`);
        }
    </script>
</body>
</html>
